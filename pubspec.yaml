name: vision_aid
description: "UniDepth ONNX inference app for depth estimation."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # ONNX Runtime for running ONNX models
  onnxruntime_v2: ^1.23.2+1
  sizer:
  flutter_svg:
  tflite_flutter:
  flutter_tts: 

  # Image processing and manipulation
  image: ^4.1.3

  # Image picker for gallery/camera access
  image_picker: ^1.0.7

  # Path provider for file access
  path_provider: ^2.1.2

  # Material design icons
  cupertino_icons: ^1.0.8
  camera: ^0.10.5+9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Asset paths for ONNX model
  assets:
    - assets/models/test_onnx_lol.onnx
    - assets/models/test_onnx_lol.onnx.data
    - assets/models/yolov10n_float16.tflite
    - assets/models/labels.txt
    - assets/images/logo.svg
    - assets/images/logo2.svg
    - assets/models/best_yolov10n_custom_int8.tflite

  # Uncomment and adjust if you have other assets
  # - assets/
  # - assets/images/
